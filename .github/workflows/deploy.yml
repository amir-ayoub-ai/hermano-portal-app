name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Aponta pra própria origem (Pages) até a API real do Coolify subir.
          # _redirects intercepta /api/* e devolve 401 → AuthContext cai no Login.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create project via API if doesn't exist
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/hermano-portal-app")
          if [ "$STATUS" = "404" ]; then
            echo "Creating Pages project..."
            curl -sS -X POST -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
              -d '{"name":"hermano-portal-app","production_branch":"main"}' | head -c 300
            echo ""
          fi

          npm install -g wrangler@3
          wrangler pages deploy dist \
            --project-name hermano-portal-app \
            --branch main \
            --commit-hash ${{ github.sha }} \
            --commit-message "auto"

      - name: Verify deploy
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hermano-portal-app.pages.dev/")
          echo "HTTPS check: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
